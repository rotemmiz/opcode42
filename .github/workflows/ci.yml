name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Test
        run: go test ./...

  codegen-fresh:
    # The generated API surface (internal/api/gen/forge.gen.go) is committed and
    # used by every build; this job asserts it is reproducible from the vendored
    # spec so a stale or hand-edited commit fails CI. Regenerate with `make gen`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Regenerate
        run: make gen
      - name: Assert committed codegen is up to date
        run: git diff --exit-code internal/api/gen/ || (echo "::error::forge.gen.go is stale — run 'make gen' and commit"; exit 1)

  sdk-fresh:
    # The Kotlin + Swift client SDKs (sdk/{kotlin,swift}/gen) are generated from
    # the frozen contract and committed; this job regenerates them and fails on any
    # diff — the same "generated output is pinned to the spec" gate the Go codegen
    # has (codegen-fresh). It also compiles the Kotlin SDK (the primary client).
    # Needs Go (for the 3.1->3.0 downconvert) + a JDK (for openapi-generator).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          # sdk/kotlin has no Gradle wrapper (it's a standalone library module, not
          # the Android app); pin a Gradle so the `gradle` CLI is on PATH for the
          # compile step below.
          gradle-version: "8.11.1"
      - name: Regenerate SDKs
        run: make gen-sdks
      - name: Assert committed SDKs are up to date
        run: |
          git diff --exit-code sdk/kotlin/gen sdk/swift/gen \
            || (echo "::error::SDKs are stale — run 'make gen-sdks' and commit sdk/{kotlin,swift}/gen"; exit 1)
      - name: Compile the Kotlin SDK
        working-directory: sdk/kotlin
        run: gradle --no-daemon build -x test

  goreleaser-snapshot:
    # Validates the release packaging config (plan 13 §Packaging verification #8):
    # `goreleaser check` lints .goreleaser.yaml and the snapshot build proves all
    # platform binaries are produced. Docker images are release-only and skipped
    # here so no registry credentials are needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Check goreleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
      - name: Snapshot build (binaries + archives, no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=docker
      - name: Assert forged binary under 40MB
        run: |
          bin=$(find dist -type f -name forged | head -n1)
          echo "binary: $bin"
          size=$(stat -c%s "$bin")
          echo "size bytes: $size"
          if [ "$size" -gt 41943040 ]; then
            echo "::error::forged binary $size bytes exceeds 40MB target"; exit 1
          fi

  android:
    # Builds the Android client (primary deliverable, plan 07) and runs its
    # deterministic JVM unit tests — including the SSE wire-parsing tests that
    # pin the Forge/opencode {id,type,properties} + payload-envelope contract.
    # Live-daemon / LLM flows are manual-verify (tasks/verify.md), not gated here.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Build (assembleDebug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
