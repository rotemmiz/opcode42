# golangci-lint v2 configuration.
version: "2"

run:
  timeout: 5m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose
    - misspell
    - revive
  exclusions:
    rules:
      # Generated oapi-codegen output (task S3) is not hand-maintained.
      - path: internal/api/gen/
        linters:
          - revive
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rotemmiz/forge
