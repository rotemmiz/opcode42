<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Opcode42 — All Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; }
  .screen-frame { border: 0; display: block; background: #15171a; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const W = 1180, H = 720;

// Return a DCArtboard ELEMENT directly (not a wrapper component) so
// DCSection's type-based child filter keeps it.
function screen(id, label, view) {
  return (
    <DCArtboard id={id} label={label} width={W} height={H}>
      <iframe className="screen-frame" loading="lazy"
        src={"Opcode42 TUI.html" + (view ? "?view=" + view : "")}
        width={W} height={H} />
    </DCArtboard>
  );
}

function Gallery() {
  return (
    <DesignCanvas>
      <DCSection id="entry" title="Entry" subtitle="First-run splash with the live tasks board">
        {screen("splash", "Splash · tasks board", "splash")}
      </DCSection>

      <DCSection id="conversation" title="Conversation" subtitle="A full coding turn, streamed">
        {screen("chat",    "Reasoning & plan", "chat")}
        {screen("tools",   "Tool calls · edit diff", "tools")}
        {screen("output",  "Write · bash · todos", "output")}
        {screen("summary", "Summary · table · subagent", "summary")}
      </DCSection>

      <DCSection id="pickers" title="Pickers & palette" subtitle="ctrl+p and the leader-key menus">
        {screen("palette",  "Command palette", "palette")}
        {screen("models",   "Model switcher", "models")}
        {screen("agents",   "Agent switcher", "agents")}
        {screen("themes",   "Theme picker", "themes")}
      </DCSection>

      <DCSection id="nav" title="Sessions & status" subtitle="Navigation and environment">
        {screen("sessions", "Session list", "sessions")}
        {screen("timeline", "Timeline · jump to message", "timeline")}
        {screen("status",   "Status · LSP / MCP", "status")}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Gallery />);
</script>
</body>
</html>
