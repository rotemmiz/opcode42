<?xml version="1.0" encoding="UTF-8"?>
<!--
  Opcode42 brand mark — G15²i two-tone dual-arc asterisk (light variant).

  Same geometry as logo-dark.svg but with dark ink on light background:
    - Arms in #1A1D21 (OnSurface on light)
    - Muted arc in #9CA3AF (OnSurfaceFaint on light)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 160 160">
  <g mask="url(#corePunchLight)" fill="none" stroke="#1A1D21" stroke-width="6" stroke-linejoin="round">
    <rect x="73" y="29" width="14" height="102" rx="7" ry="7" transform="rotate(0 80 80)" />
    <rect x="73" y="29" width="14" height="102" rx="7" ry="7" transform="rotate(60 80 80)" />
    <rect x="73" y="29" width="14" height="102" rx="7" ry="7" transform="rotate(120 80 80)" />
  </g>
  <defs>
    <mask id="corePunchLight" maskUnits="userSpaceOnUse" x="0" y="0" width="160" height="160">
      <rect x="0" y="0" width="160" height="160" fill="white" />
      <circle cx="80" cy="80" r="15" fill="black" />
    </mask>
  </defs>
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M80,68 A12,12 0 0 1 92,80" stroke="#1A1D21" />
    <path d="M80,92 A12,12 0 0 1 68,80" stroke="#9CA3AF" />
  </g>
</svg>