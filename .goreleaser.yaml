# goreleaser config for the Forge daemon (plan 13 §Packaging & Ops).
#
# Produces a single static, CGO-free binary per platform (modernc.org/sqlite is
# pure Go, so CGO_ENABLED=0 keeps the binary self-contained and small — plan 13
# binary-size target < 40 MB). Validate locally with:
#   goreleaser check
#   goreleaser release --snapshot --clean
version: 2

project_name: forge

before:
  hooks:
    - go mod tidy

builds:
  - id: forged
    main: ./cmd/forged
    binary: forged
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # Stamp the version from the git tag (plan 13: -X main.version).
      - -s -w -X main.version={{ .Version }}
    # NOTE: windows is intentionally omitted. internal/lsp/service.go uses
    # Unix-only syscalls (Setpgid/Getpgid/Kill) without build constraints, so a
    # windows/amd64 cross-build fails today. Re-add windows here once the daemon
    # is made Windows-portable (tracked as a plan 13 followup; the Windows
    # service wrapper in §"Windows Service" depends on it).
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: forge
    ids:
      - forged
    # forge_linux_amd64.tar.gz, etc. (plan 13 artifact naming).
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Multi-arch container images. Built only on a real (tagged) release, not on the
# snapshot CI dry-run, so CI needs no registry credentials.
dockers:
  - image_templates:
      - "ghcr.io/rotemmiz/forge:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
  - image_templates:
      - "ghcr.io/rotemmiz/forge:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/rotemmiz/forge:{{ .Version }}"
    image_templates:
      - "ghcr.io/rotemmiz/forge:{{ .Version }}-amd64"
      - "ghcr.io/rotemmiz/forge:{{ .Version }}-arm64"
  - name_template: "ghcr.io/rotemmiz/forge:latest"
    image_templates:
      - "ghcr.io/rotemmiz/forge:{{ .Version }}-amd64"
      - "ghcr.io/rotemmiz/forge:{{ .Version }}-arm64"

release:
  github:
    owner: rotemmiz
    name: forge
  draft: true
  prerelease: auto
